name: CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Show Swift version
        run: swift --version
      - name: Build package
        run: swift build -c release
      - name: Smoke test app bundle
        run: scripts/smoke_test.sh
